<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Assignment</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="container">

<h2>Add Assignment</h2>

<form th:action="@{/admin/add-assignment}" method="post">

    <label>Name:</label>
    <input type="text" name="name" required/>

    <label>Description:</label>
    <input type="text" name="description"/>

    <label>Due Date:</label>
    <input type="date" name="dueDate" required/>

    <label>Course:</label>
    <select name="courseId">
        <option th:each="course : ${courses}"
                th:value="${course.id}"
                th:text="${course.name}">
        </option>
    </select>

    <button type="submit">Save Assignment</button>

</form>

</div>

</body>
</html>
